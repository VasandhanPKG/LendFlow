
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LendFlow Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-in { animation: fadeInUp 0.4s ease-out forwards; }
      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.2s; }
      .delay-3 { animation-delay: 0.3s; }

      body {
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        transition: background-image 0.5s ease-in-out;
      }

      .bg-overlay {
        position: fixed;
        inset: 0;
        z-index: -1;
        transition: background 0.5s ease-in-out, backdrop-filter 0.5s ease;
      }

      .theme-light .bg-overlay {
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(8px);
      }

      .theme-dark .bg-overlay {
        background: rgba(15, 23, 42, 0.92);
        backdrop-filter: blur(12px) brightness(0.8);
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(124, 58, 237, 0.2); border-radius: 10px; }
    </style>

  </head>

  </body>
</html>
